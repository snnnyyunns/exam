<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Exam Countdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0efe8;
    --muted: #6b6a7a;
    --subtle: #3a3a4a;
    --urgent: #ff6b4a;
    --urgent-bg: rgba(255,107,74,0.1);
    --soon: #4adfaa;
    --soon-bg: rgba(74,223,170,0.08);
    --normal: #7b8cde;
    --normal-bg: rgba(123,140,222,0.08);
    --done-bg: rgba(58,58,74,0.3);
    --now: #f5c842;
    --now-bg: rgba(245,200,66,0.1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 64px 64px;
    pointer-events: none;
    z-index: 0;
  }

  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  .orb-1 { width: 700px; height: 700px; background: #4a3fff; top: -250px; left: -200px; }
  .orb-2 { width: 450px; height: 450px; background: #ff4a6b; bottom: -150px; right: -100px; }
  .orb-3 { width: 350px; height: 350px; background: #4adfaa; top: 45%; right: 5%; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1120px;
    margin: 0 auto;
    padding: 72px 28px 100px;
  }

  .header {
    text-align: center;
    margin-bottom: 64px;
    animation: fadeUp 0.9s ease both;
  }

  .top-badges {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(74,223,170,0.08);
    border: 1px solid rgba(74,223,170,0.18);
    border-radius: 20px;
    padding: 5px 13px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--soon);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .visitor-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(123,140,222,0.08);
    border: 1px solid rgba(123,140,222,0.18);
    border-radius: 20px;
    padding: 5px 13px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--normal);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: opacity 0.4s ease;
  }

  .visitor-icon {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--normal);
  }

  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--soon);
    animation: blink 2s ease infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(44px, 8vw, 80px);
    font-weight: 400;
    line-height: 0.95;
    letter-spacing: -0.025em;
    margin-bottom: 16px;
  }

  h1 em {
    font-style: italic;
    color: transparent;
    -webkit-text-stroke: 1.5px rgba(240,239,232,0.35);
  }

  .clock-display {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.04em;
  }

  .stats {
    display: flex;
    gap: 1px;
    background: var(--border);
    border-radius: 18px;
    overflow: hidden;
    margin-bottom: 52px;
    border: 1px solid var(--border);
    animation: fadeUp 0.9s 0.1s ease both;
  }

  .stat {
    flex: 1;
    padding: 22px 16px;
    background: var(--surface);
    text-align: center;
  }

  .stat-num {
    font-family: 'DM Serif Display', serif;
    font-size: 40px;
    line-height: 1;
    margin-bottom: 5px;
  }
  .stat-num.upcoming { color: var(--normal); }
  .stat-num.ongoing  { color: var(--now); }
  .stat-num.done     { color: var(--muted); }
  .stat-num.visits   { color: var(--urgent); }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    overflow: hidden;
    transition: border-color 0.3s ease, transform 0.25s ease;
    animation: fadeUp 0.7s ease both;
  }

  .card:hover { border-color: var(--border2); transform: translateY(-3px); }
  .card.is-urgent { border-color: rgba(255,107,74,0.22); }
  .card.is-soon   { border-color: rgba(74,223,170,0.14); }
  .card.is-done   { opacity: 0.45; }

  .card:nth-child(1) { animation-delay: 0.06s }
  .card:nth-child(2) { animation-delay: 0.12s }
  .card:nth-child(3) { animation-delay: 0.18s }
  .card:nth-child(4) { animation-delay: 0.24s }
  .card:nth-child(5) { animation-delay: 0.30s }
  .card:nth-child(6) { animation-delay: 0.36s }

  .card-header {
    padding: 22px 22px 18px;
    border-bottom: 1px solid var(--border);
  }

  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 4px 11px;
    border-radius: 20px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .pill-dot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; }

  .pill.urgent { background: var(--urgent-bg); color: var(--urgent); border: 1px solid rgba(255,107,74,0.22); }
  .pill.soon   { background: var(--soon-bg);   color: var(--soon);   border: 1px solid rgba(74,223,170,0.2); }
  .pill.normal { background: var(--normal-bg); color: var(--normal); border: 1px solid rgba(123,140,222,0.2); }
  .pill.done-p { background: var(--done-bg);   color: var(--muted);  border: 1px solid var(--border); }
  .pill.now-p  { background: var(--now-bg);    color: var(--now);    border: 1px solid rgba(245,200,66,0.2); }
  .pill.now-p .pill-dot { animation: blink 1s ease infinite; }

  .card-code {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
    letter-spacing: 0.06em;
  }

  .card-name {
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.45;
    min-height: 44px;
  }

  .card-body { padding: 18px 22px 22px; }

  .progress-track {
    height: 2px;
    background: var(--surface2);
    border-radius: 2px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 1s linear; }

  .countdown {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .cd-unit {
    background: var(--surface2);
    border-radius: 12px;
    padding: 12px 6px 10px;
    text-align: center;
  }

  .cd-val {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    font-weight: 500;
    line-height: 1;
    margin-bottom: 5px;
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
  }
  .cd-lbl {
    display: block;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
  }
  .cd-unit.urgent-u .cd-val { color: var(--urgent); }
  .cd-unit.soon-u   .cd-val { color: var(--soon); }
  .cd-unit.normal-u .cd-val { color: var(--normal); }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }
  .meta-sep { color: var(--subtle); }

  .done-state {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0 14px;
  }
  .done-check {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .done-check svg { width: 13px; height: 13px; }
  .done-text { font-size: 13px; color: var(--muted); }

  .ongoing-state { padding: 6px 0 14px; text-align: center; }
  .ongoing-time  { font-family: 'DM Serif Display', serif; font-size: 36px; color: var(--now); margin-bottom: 5px; }
  .ongoing-sub   { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; letter-spacing: 0.07em; }

  .footer {
    text-align: center;
    margin-top: 72px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--subtle);
    letter-spacing: 0.07em;
    animation: fadeUp 0.9s 0.5s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes countUp {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .visitor-count {
    display: inline-block;
    animation: countUp 0.5s ease both;
  }

  @media (max-width: 640px) {
    .container { padding: 48px 16px 72px; }
    h1 { font-size: 48px; }
    .cards { grid-template-columns: 1fr; }
    .stat-num { font-size: 32px; }
  }

  /* ── Audio player ── */
  .audio-player {
    position: fixed;
    bottom: 28px;
    right: 28px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }

  .audio-panel {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 200px;
    opacity: 0;
    transform: translateY(8px) scale(0.97);
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  .audio-panel.open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: all;
  }

  .audio-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .audio-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .audio-toggle {
    width: 36px; height: 20px;
    background: var(--surface2);
    border-radius: 10px;
    border: 1px solid var(--border2);
    cursor: pointer;
    position: relative;
    transition: background 0.2s ease;
    flex-shrink: 0;
  }
  .audio-toggle::after {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--muted);
    top: 2px; left: 2px;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .audio-toggle.on { background: rgba(74,223,170,0.15); border-color: rgba(74,223,170,0.3); }
  .audio-toggle.on::after { transform: translateX(16px); background: var(--soon); }

  .volume-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .volume-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 2px;
    background: var(--surface2);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .volume-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--normal);
    cursor: pointer;
  }

  .audio-fab {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s ease, transform 0.15s ease;
    flex-shrink: 0;
  }
  .audio-fab:hover { border-color: rgba(255,255,255,0.25); transform: scale(1.05); }
  .audio-fab svg { width: 18px; height: 18px; }

  .audio-divider {
    height: 1px;
    background: var(--border);
    margin: 0 -2px;
  }

  @media (max-width: 640px) {
    .audio-player { bottom: 16px; right: 16px; }
    .audio-panel { min-width: 170px; }
  }
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="container">
  <header class="header">
    <div class="top-badges">
      <div class="live-badge"><span class="live-dot"></span>Live</div>
      <div class="visitor-badge" id="visitor-badge">
        <span class="visitor-icon"></span>
        <span id="visitor-text">Loading…</span>
      </div>
    </div>
    <h1>Final <em>exam💀</em><br>6️⃣countdown7️⃣</h1>
    <div class="clock-display" id="clock">—</div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-num upcoming" id="s-upcoming">—</div><div class="stat-label">Upcoming</div></div>
    <div class="stat"><div class="stat-num ongoing"  id="s-ongoing">—</div><div class="stat-label">Ongoing</div></div>
    <div class="stat"><div class="stat-num done"     id="s-done">—</div><div class="stat-label">Completed</div></div>
    <div class="stat"><div class="stat-num visits"   id="s-visits">—</div><div class="stat-label">Visitors</div></div>
  </div>

  <div class="cards" id="cards"></div>

  <footer class="footer">Ticks every second &nbsp;·&nbsp; Times shown in your local timezone</footer>
</div>

<!-- ── Audio player ─────────────────────────────────────────────── -->
<!--
  Put your audio files in an "audio/" folder in your GitHub repo:
    audio/music.mp3   ← background music (will loop)
    audio/tick.mp3    ← short tick sound (~0.1s click/beep)
    audio/alarm.mp3   ← plays once when an exam becomes "Due today"
-->
<audio id="bg-music" src="audio/music.mp3" preload="auto"></audio>
<audio id="sfx-tick"  src="audio/tick.mp3"  preload="auto"></audio>
<audio id="sfx-alarm" src="audio/alarm.mp3" preload="auto"></audio>

<div class="audio-player">
  <div class="audio-panel" id="audio-panel">

    <div class="audio-row">
      <span class="audio-label">Music</span>
      <div class="audio-toggle" id="toggle-music" title="Toggle background music"></div>
    </div>

    <div class="volume-row">
      <span class="audio-label" style="flex-shrink:0">Vol</span>
      <input type="range" id="vol-music" min="0" max="100" value="40">
    </div>

    <div class="audio-divider"></div>

    <div class="audio-row">
      <span class="audio-label">Tick</span>
      <div class="audio-toggle" id="toggle-tick" title="Toggle tick sound every second"></div>
    </div>

    <div class="audio-divider"></div>

    <div class="audio-row">
      <span class="audio-label">Alarm</span>
      <div class="audio-toggle on" id="toggle-alarm" title="Play alarm when exam is due today"></div>
    </div>

  </div>

  <div class="audio-fab" id="audio-fab" title="Audio settings">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" opacity="0.9"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07" id="wave-1"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14" id="wave-2"/>
    </svg>
  </div>
</div>

<script>
/* ── Visitor counter (Supabase) ───────────────────────────────────────────
   ONE-TIME SETUP (~5 minutes, free):

   1. Go to https://supabase.com → sign up → New project (any name/region)

   2. Once your project is ready, open the SQL Editor and run this:

      CREATE TABLE counter (
        id    text primary key,
        count bigint default 0
      );
      INSERT INTO counter VALUES ('visits', 0);

      CREATE OR REPLACE FUNCTION increment_counter(counter_id text)
      RETURNS bigint LANGUAGE sql AS $$
        UPDATE counter SET count = count + 1
        WHERE id = counter_id RETURNING count;
      $$;

   3. Go to Settings → API and copy:
      - "Project URL"       → paste into SUPABASE_URL below
      - "anon / public" key → paste into SUPABASE_KEY below

   That's it — the counter will work on any static host including GitHub Pages.
   ───────────────────────────────────────────────────────────────────────── */

const SUPABASE_URL = "https://adkaceonjiejvegtxjks.supabase.co"; // ← replace
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFka2FjZW9uamllanZlZ3R4amtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3OTY4MTUsImV4cCI6MjA5MzM3MjgxNX0.mwWTlhP0ThhtqH-CcyLOABR5hOreGrDHwAZOKA7MOcA";                        // ← replace

function applyCount(count) {
  const el = document.getElementById("visitor-text");
  el.innerHTML = `<span class="visitor-count">${count.toLocaleString()}</span>&nbsp;visit${count === 1 ? "" : "s"}`;
  const stat = document.getElementById("s-visits");
  if (stat) stat.textContent = count.toLocaleString();
}

async function loadVisitorCount() {
  if (SUPABASE_URL.includes("YOUR_PROJECT_ID")) return; // not configured yet
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/increment_counter`, {
      method:  "POST",
      headers: {
        "apikey":        SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type":  "application/json"
      },
      body: JSON.stringify({ counter_id: "visits" })
    });
    if (!res.ok) throw new Error("Supabase error");
    const count = await res.json();           // returns a single number
    if (typeof count === "number") applyCount(count);
  } catch {
    document.getElementById("visitor-badge").style.display = "none";
    const stat = document.getElementById("s-visits");
    if (stat) stat.closest(".stat").style.display = "none";
  }
}

loadVisitorCount();

/* ── Exam data ───────────────────────────────────────────────────────────── */
const exams = [
  { code:"ITGE275", name:"Economics",                                                   date:"2026-05-05", start:"15:00", end:"16:00" },
  { code:"ITCS225", name:"Principles of Operating Systems",                             date:"2026-05-06", start:"15:00", end:"17:00" },
  { code:"ITCS224", name:"Fundamentals of Information Systems & Software Development",  date:"2026-05-07", start:"15:00", end:"17:00" },
  { code:"ITCS227", name:"Introduction to Data Science",                                date:"2026-05-08", start:"15:00", end:"17:00" },
  { code:"ITCS226", name:"Introduction to Computer Network",                            date:"2026-05-11", start:"15:00", end:"17:00" },
  { code:"ITCS223", name:"Introduction to Web Development",                             date:"2026-05-14", start:"15:00", end:"16:30" },
];

function toDate(d, t) {
  const [y,mo,day]=d.split("-").map(Number), [h,mn]=t.split(":").map(Number);
  return new Date(y,mo-1,day,h,mn,0);
}
function pad(n){return String(n).padStart(2,"0")}

function buildCards() {
  const c = document.getElementById("cards");
  exams.forEach((_,i) => {
    const el = document.createElement("div");
    el.className = "card";
    el.id = "card-"+i;
    el.innerHTML = `
      <div class="card-header">
        <div class="pill" id="pill-${i}"><span class="pill-dot"></span><span id="pt-${i}"></span></div>
        <div class="card-code">${exams[i].code}</div>
        <div class="card-name">${exams[i].name}</div>
      </div>
      <div class="card-body" id="body-${i}"></div>`;
    c.appendChild(el);
  });
}

function tick() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"}) +
    "  ·  " + now.toLocaleTimeString("en-GB");

  let upcoming=0, ongoing=0, done=0;
  exams.forEach(e => {
    const s=toDate(e.date,e.start), en=toDate(e.date,e.end);
    if(now>en) done++; else if(now>=s) ongoing++; else upcoming++;
  });
  document.getElementById("s-upcoming").textContent = upcoming;
  document.getElementById("s-ongoing").textContent  = ongoing;
  document.getElementById("s-done").textContent     = done;

  exams.forEach((exam,i) => {
    const s=toDate(exam.date,exam.start), en=toDate(exam.date,exam.end);
    const diff=s-now;
    const isDone=now>en, isNow=now>=s&&now<=en;
    const days=diff/(864e5);

    const card  = document.getElementById("card-"+i);
    const pill  = document.getElementById("pill-"+i);
    const pt    = document.getElementById("pt-"+i);
    const body  = document.getElementById("body-"+i);

    card.className = "card" + (isDone?" is-done": isNow?"": days<1?" is-urgent": days<3?" is-soon":"");

    if(isDone)        { pill.className="pill done-p"; pt.textContent="Completed"; }
    else if(isNow)    { pill.className="pill now-p";  pt.textContent="In progress"; }
    else if(days<1)   { pill.className="pill urgent"; pt.textContent="Due today"; }
    else if(days<3)   { pill.className="pill soon";   pt.textContent="Coming soon"; }
    else              { pill.className="pill normal";  pt.textContent="Scheduled"; }

    const dateStr = s.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});

    if(isDone) {
      body.innerHTML=`
        <div class="done-state">
          <div class="done-check"><svg viewBox="0 0 13 13" fill="none"><path d="M2 7L5 10L11 3.5" stroke="#6b6a7a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <div class="done-text">Exam finished — you survived.</div>
        </div>
        <div class="card-meta">${dateStr}<span class="meta-sep">/</span>${exam.start} – ${exam.end}</div>`;
    } else if(isNow) {
      const rem=en-now, rm=Math.floor(rem/60000), rs=Math.floor((rem%60000)/1000);
      const pct=Math.round(((now-s)/(en-s))*100);
      body.innerHTML=`
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:var(--now)"></div></div>
        <div class="ongoing-state">
          <div class="ongoing-time">${rm}m ${pad(rs)}s</div>
          <div class="ongoing-sub">remaining &nbsp;·&nbsp; ${pct}% through</div>
        </div>
        <div class="card-meta">${dateStr}<span class="meta-sep">/</span>${exam.start} – ${exam.end}</div>`;
    } else {
      const total=Math.floor(diff/1000);
      const d=Math.floor(total/86400), h=Math.floor((total%86400)/3600);
      const m=Math.floor((total%3600)/60), sc=total%60;
      const uc = days<1?"urgent-u": days<3?"soon-u":"normal-u";
      const fc = days<1?"var(--urgent)": days<3?"var(--soon)":"var(--normal)";
      const pct = Math.max(2,Math.min(97,Math.round((1-(diff/(14*864e5)))*100)));
      body.innerHTML=`
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${fc}"></div></div>
        <div class="countdown">
          <div class="cd-unit ${uc}"><span class="cd-val">${d}</span><span class="cd-lbl">days</span></div>
          <div class="cd-unit ${uc}"><span class="cd-val">${pad(h)}</span><span class="cd-lbl">hrs</span></div>
          <div class="cd-unit ${uc}"><span class="cd-val">${pad(m)}</span><span class="cd-lbl">min</span></div>
          <div class="cd-unit ${uc}"><span class="cd-val">${pad(sc)}</span><span class="cd-lbl">sec</span></div>
        </div>
        <div class="card-meta">${dateStr}<span class="meta-sep">/</span>${exam.start} – ${exam.end}</div>`;
    }
  });
}

buildCards();
tick();
setInterval(tick, 1000);

/* ── Audio ───────────────────────────────────────────────────────── */
const music      = document.getElementById("bg-music");
const sfxTick    = document.getElementById("sfx-tick");
const sfxAlarm   = document.getElementById("sfx-alarm");
const fab        = document.getElementById("audio-fab");
const panel      = document.getElementById("audio-panel");
const btnMusic   = document.getElementById("toggle-music");
const btnTick    = document.getElementById("toggle-tick");
const btnAlarm   = document.getElementById("toggle-alarm");
const volMusic   = document.getElementById("vol-music");

let musicOn  = false;
let tickOn   = false;
let alarmOn  = true;
let panelOpen = false;
const alarmFired = new Set(); // tracks which exams have already alarmed

// Panel open/close
fab.addEventListener("click", () => {
  panelOpen = !panelOpen;
  panel.classList.toggle("open", panelOpen);
});
document.addEventListener("click", e => {
  if (panelOpen && !fab.contains(e.target) && !panel.contains(e.target)) {
    panelOpen = false;
    panel.classList.remove("open");
  }
});

// Music toggle
btnMusic.addEventListener("click", () => {
  musicOn = !musicOn;
  btnMusic.classList.toggle("on", musicOn);
  if (musicOn) {
    music.volume = volMusic.value / 100;
    music.play().catch(() => {});
    updateFabIcon(true);
  } else {
    music.pause();
    if (!tickOn) updateFabIcon(false);
  }
});

// Volume
volMusic.addEventListener("input", () => {
  music.volume = volMusic.value / 100;
});

// Tick toggle
btnTick.addEventListener("click", () => {
  tickOn = !tickOn;
  btnTick.classList.toggle("on", tickOn);
  if (tickOn) updateFabIcon(true);
  else if (!musicOn) updateFabIcon(false);
});

// Alarm toggle
btnAlarm.addEventListener("click", () => {
  alarmOn = !alarmOn;
  btnAlarm.classList.toggle("on", alarmOn);
});

// Play tick each second (hooked into existing setInterval)
const _origTick = tick;
function tickWithAudio() {
  _origTick();

  // Tick SFX
  if (tickOn) {
    const t = sfxTick.cloneNode();
    t.volume = 0.35;
    t.play().catch(() => {});
  }

  // Alarm SFX — fires once per exam when it enters "Due today" state
  if (alarmOn) {
    const now = new Date();
    exams.forEach((exam, i) => {
      const s    = toDate(exam.date, exam.start);
      const en   = toDate(exam.date, exam.end);
      const diff = s - now;
      const days = diff / 864e5;
      const isDue = diff > 0 && days < 1;
      if (isDue && !alarmFired.has(i)) {
        alarmFired.add(i);
        sfxAlarm.currentTime = 0;
        sfxAlarm.play().catch(() => {});
      }
    });
  }
}

// Replace the interval with the audio-aware version
clearInterval(window._tickInterval);
window._tickInterval = setInterval(tickWithAudio, 1000);

// FAB icon: muted vs active
function updateFabIcon(active) {
  const w1 = document.getElementById("wave-1");
  const w2 = document.getElementById("wave-2");
  if (active) {
    w1.style.opacity = "1";
    w2.style.opacity = "1";
    fab.style.borderColor = "rgba(74,223,170,0.35)";
  } else {
    w1.style.opacity = "0.2";
    w2.style.opacity = "0.2";
    fab.style.borderColor = "";
  }
}
updateFabIcon(false);
</script>
